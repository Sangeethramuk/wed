name: CI Bot

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Lint check
        run: npm run lint
        
      - name: Build check
        run: npm run build
